# Training hyperparameters.

epochs: 150
batch_size: 1
accumulation_steps: 8        # Effective batch size = batch_size * accumulation_steps
num_workers: 4
pin_memory: true
prefetch_factor: 2

amp: true
grad_checkpointing: true

optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-5

scheduler:
  name: reduce_on_plateau
  patience: 12
  factor: 0.5
  min_lr: 1.0e-6

loss:
  name: dice_focal           # MONAI DiceFocalLoss
  include_background: false
  to_onehot_y: true
  softmax: true
  lambda_dice: 1.0
  lambda_focal: 1.0
  focal_gamma: 2.0

augmentation:
  flip_prob: 0.5
  rotate_prob: 0.5
  affined_prob: 0.3

logging:
  val_interval: 1            # Run validation every N epochs
  log_interval: 10           # Log training loss every N batches
  save_best: true            # Save the best checkpoint by validation Dice
